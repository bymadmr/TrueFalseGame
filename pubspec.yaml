name: dogru_yanlis_app
description: A "True or False" quiz app with interesting facts.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^6.1.0
  provider: ^6.0.5
  shared_preferences: ^2.2.2
  animate_do: ^3.3.4
  confetti: ^0.7.0
  audioplayers: ^5.2.1
  circular_countdown_timer: ^0.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/data/questions.json
    - assets/audio/correct.mp3
    - assets/audio/wrong.mp3
    - assets/audio/background_music.mp3
